name: Build and Push to Docker Hub
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # حدثنا النسخة لـ v4 عشان الـ Warning يختفي

      - name: Login to Docker Hub
        uses: docker/login-action@v3 # حدثنا النسخة لـ v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/my-node-app:v2 .
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/my-node-app:v2
